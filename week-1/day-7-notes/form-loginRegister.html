<!DOCTYPE html>
<html lang="eng">

<head>

    <link rel="stylesheet" href="form-loginRegister.css"/>

</head>

<body>

    <form>

     <section>

            <h2>Log In</h2>
            <p>Please continue to log in</p>

        <div>

            <label>User name or e-mail id</label>
            <input type="text" id="name" name="name"/>

        </div>

        <div>

            <label>Password</label>
            <input type="password" id="password"/>

        </div>

        <div>

            <label>
                <input type="checkbox" name="remember"/>
                Remember Me
            </label>

            <a href="#">Forgot Password?</a>

        </div>

        <button type="submit" name="log in">Log In</button>

        <p>
            Don't have an account?
            <a href="form-loginRegister.html">Register</a>
        </p>

     </section>

    </form>



</body>








</html>
