<!DOCTYPE html>
<html lang="eng">

<head>

    <link rel="stylesheet" href="form-loginRegister.css"/>

    <script src="form-loginRegister.js" defer></script>

</head>

<body>

    <form>

     <section>

            <h2>Log In</h2>
            <p>Please continue to log in</p>

        <div>

            <label for="name">User name or e-mail id</label>
            <input type="text" id="name" name="name" placeholder="user name or e-mail id"/>

        </div>

        <div>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="password" name="password"/>

        </div>

        <div>

            <label for="remember">
                <input type="checkbox" name="remember" id="remember"/>
                Remember Me
            </label>

            <a href="#">Forgot Password?</a>

        </div>

        <button type="submit" name="log in">Log In</button>

        <p>
            Don't have an account?
            <a href="Register.html">Register</a>
        </p>

     </section>

    </form>



</body>

</html>
