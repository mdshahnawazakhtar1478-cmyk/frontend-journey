<!DOCTYPE html>
<html lang="eng">

<head>

    <title>Log In</title>
    <link rel="stylesheet" href="form-login.css"/>

</head>

<body>

    <form>

        <section>

            <h2>Log In</h2>
            <p>Please continue to log in</p>

        <div>

            <label for="name">User Name or e-mail id:</label>
            <input type="text" placeholder="User Name or e-mail id" name="name" id="name"/>

        </div>

        <div>

            <label for="password">Password:</label>
            <input type="password" placeholder="password" name="password" id=password/>

        </div>

        <div>
                <label>
                    <input type="checkbox" name="remember">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

        </div>

        <button type="submit" name="login">Login</button>

        </section>

    </form>

</body>




</html>
