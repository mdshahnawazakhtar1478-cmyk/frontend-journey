<!DOCTYPE html>
<html lang="eng">

<head>

    <title>Log In</title>
    <link rel="stylesheet" href="formLogin.css"/>
    <script src="formLogin.js" defer></script>

</head>

<body>

    <form>

        <section>

            <h2>Log In</h2>
            <p>Please continue to log in</p>

        <div>

            <label for="username">User Name or e-mail id:</label>
            <input type="text" placeholder="User Name or e-mail id" name="name" id="username"/>

        </div>

        <div>

            <label for="password">Password:</label>
            <input type="password" placeholder="password" name="password" id="password"/>

        </div>

        <div>
                <label>
                    <input type="checkbox" name="remember" id="remember"/>
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

        </div>

        <button type="submit" name="login">Login</button>

        </section>

    </form>

</body>




</html>
