<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Register</title>
    <link rel="stylesheet" href="Register.css"/>
    <script src="Register.js" defer></script>

</head>

<body>

    <form>

     <section>

        <h2>Create Account</h2>

        <div>

            <label for="name">Full Name:</label>
            <input type="text" placeholder="Full Name" id="name" name="name" required/>

        </div>

        <div>

            <label for="email">E-Mail ID:</label>
            <input type="email" placeholder="E-Mail ID" id="email" name="email" required/>

        </div>

        <div>

            <label for="phone">Phone Number:</label>
            <input type="tel" placeholder="Phone Number" id="phone" name="phone"/>

        </div>

        <div>

            <label for="password">Password:</label>
            <input type="password" placeholder="Password" id="password" name="password" required/>

        </div>

        <div>

            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" placeholder="Password" id="confirmPassword" name="confirmPassword" required/>

        </div>

        <div>

            <label for="terms">
                <input type="checkbox" required id="terms" name="terms"/>
                I agree to Terms & Condition.
            </label>

        </div>

        <button name="submit">Submit</button>

        <p>
            Already have an Account?
            <a href="form-loginRegister.html">Log In</a>
        </p>

     </section>

    </form>
    
</body>

</html>
