<!DOCTYPE html>
<html lang="eng">

<head>

    <title>Complete Html form</title>

    <link rel="stylesheet" href="form3.css"/>

</head>

<body>

    <form>

    <section>

        <h2>Complete Html form</h2>

    <div>
        <label>Full Name:</label>
        <input type="text" placeholder="Full Name" name="fullName;"/>
    </div>

    <div>
        <label>Password:</label>
        <input type="password" placeholder="password" name="password;"/>
    </div>

    <div>
        <label>E-mail:</label>
        <input type="email" placeholder="E-mail" name="email;"/>
    </div>

    <div>

    <label>Phone:</label>
    <input type="tel" placeholder="Phone Number"/>

    </div>

    <div>    
        <label>Website:</label>
        <input type="url" placeholder="website"/>
    </div>

    <div>
        <label>Age:</label>
        <input type="number" placeholder="Age"/>
    </div>

    <div>
        <label>search:</label>
        <input type="search" placeholder="search"/>
    </div>

    <div>   
        <label>Date:</label>
        <input type="date"/>
    </div>

    <div>
        <label>Time:</label>
        <input type="time"/>
    </div>

    <div>
        <label>Date & Time:</label>
        <input type="datetime-local"/>
    </div>

    <div>
        <label>Month:</label>
        <input type="month"/>
    </div>

    <div>
        <label>Week:</label>
        <input type="week"/>
    </div>

    <div>
        <label>Favorite color:</label>
        <input type="color"/>
    </div>  

    <div>
        <label>Experience level:</label>
        <input type="range" min="0" max="10"/>
    </div>

    <div>
        <p>Gender:</p>
    
        <div>
            <input type="radio" id="male" value="Male" name="gender"/>
            <label for="male">Male</label>
        </div>

        <div>
            <input type="radio" id="female" value="Female" name="gender"/>
            <label for="female">Female</label>
        </div>

    </div>

    <div>
        <p>Skill:</p>

        <div>
            <input type="checkbox" value="HTML" name="skills" id="html"/>
            <label for="HTML">HTML</label>
        </div> 
        
        <div>
            <input type="checkbox" value="CSS" name="skills" id="css"/>
            <label for="CSS">CSS</label>
        </div>

        <div>
            <input type="checkbox" value="JavaScript" name="skills" id="javasript"/>
            <label for="JavaScript">JavaScript</label>
        </div>

    </div>

    <div>
        <label>Upload Resume</label>
        <input type="file"/>
    </div>

    <div>
    <label>City:</label>
        <select>
            <option>Select City</option>
            <option>Mumbai</option>
            <option>Delhi</option>
            <option>Kolkata</option>
            <option>Chennai</option>
        </select>
    </div>

    <div>
        <label>Message:</label><br>
        <textarea rows="5" cols="30"></textarea>
    </div>

        <button>Submit</button>

    </section>    

    </form>

</body>


</html>
