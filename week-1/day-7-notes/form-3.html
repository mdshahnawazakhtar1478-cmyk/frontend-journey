<!DOCTYPE html>
<html lang="eng">

<head>

    <title>Complete Html form</title>

    <link rel="stylesheet" href="form3.css"/>

    <script src="form-3.js" defer></script>

</head>

<body>

    <form>

    <section>

        <h2>Complete Html form</h2>

    <div>
        <label>Full Name:</label>
        <input type="text" placeholder="Full Name" name="fullName;" class="fullName"/>
    </div>

    <div>
        <label>Password:</label>
        <input type="password" placeholder="password" name="password;" class="password"/>
    </div>

    <div>
        <label>E-mail:</label>
        <input type="email" placeholder="E-mail" name="email;" class="email"/>
    </div>

    <div>

    <label>Phone:</label>
    <input type="tel" placeholder="Phone Number" class="phone"/>

    </div>

    <div>    
        <label>Website:</label>
        <input type="url" placeholder="website" class="website"/>
    </div>

    <div>
        <label>Age:</label>
        <input type="number" placeholder="Age" class="age"/>
    </div>

    <div>
        <label>search:</label>
        <input type="search" placeholder="search" class="search"/>
    </div>

    <div>   
        <label>Date:</label>
        <input type="date" class="date"/>
    </div>

    <div>
        <label>Time:</label>
        <input type="time" class="time"/>
    </div>

    <div>
        <label>Date & Time:</label>
        <input type="datetime-local" class="dateTimeLocal"/>
    </div>

    <div>
        <label>Month:</label>
        <input type="month" class="month"/>
    </div>

    <div>
        <label>Week:</label>
        <input type="week" class="week"/>
    </div>

    <div>
        <label>Favorite color:</label>
        <input type="color" class="color"/>
    </div>  

    <div>
        <label>Experience level:</label>
        <input type="range" min="0" max="10" class="experience"/>
    </div>

    <div>
        <p>Gender:</p>
    
        <div>
            <input type="radio" id="male" value="Male" name="gender"/>
            <label for="male">Male</label>
        </div>

        <div>
            <input type="radio" id="female" value="Female" name="gender"/>
            <label for="female">Female</label>
        </div>

    </div>

    <div>
        <p>Skill:</p>

        <div>
            <input type="checkbox" value="HTML" name="skills" id="html"/>
            <label for="HTML">HTML</label>
        </div> 
        
        <div>
            <input type="checkbox" value="CSS" name="skills" id="css"/>
            <label for="CSS">CSS</label>
        </div>

        <div>
            <input type="checkbox" value="JavaScript" name="skills" id="javasript"/>
            <label for="JavaScript">JavaScript</label>
        </div>

    </div>

    <div>
        <label>Upload Resume</label>
        <input type="file" class="uploadResume"/>
    </div>

    <div>
    <label for="city">City:</label>
        <select name="city" id="city">
            <option value="select city">Select City</option>
            <option value="mumbai">Mumbai</option>
            <option value="delhi">Delhi</option>
            <option value="kolkata">Kolkata</option>
            <option value="chennai">Chennai</option>
        </select>
    </div>

    <div>
        <label>Message:</label><br>
        <textarea rows="5" cols="30" class="message"></textarea>
    </div>

        <button>Submit</button>

    </section>    

    </form>

</body>


</html>
