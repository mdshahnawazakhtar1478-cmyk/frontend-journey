<!DOCTYPE html>
<html lang="eng">

<head>

    <title>Complete Html form</title>

    <link rel="stylesheet" href="week-1/day-7-notes/form3.css"/>

</head>

<body>

    <form>

    <h2>Complete Html form</h2>

    <div style="display:flex;flex-direction:column;width:200px">

    <label>Full Name:</label>
    <input type="text" placeholder="Full Name" name="fullName;"/><br><br>

    </div>

    <div style="display:flex;flex-direction:column;width:200px">

    <label>Password:</label>
    <input type="password" placeholder="password" name="password;"/><br><br>

    </div>

    <div style="display:flex;flex-direction:column;width: 200px;">

    <label>E-mail:</label>
    <input type="email" placeholder="E-mail" name="email;"/><br><br>

    </div>

    <div style="display:flex;flex-direction:column;width:200px;">

    <label>Phone:</label>
    <input type="tel" placeholder="Phone Number"/><br><br>

    </div>

    <div style="display:flex;flex-direction:column;width:200px;">
    
    <label>Website:</label>
    <input type="url" placeholder="website"/><br><br>

    </div>

    <label>Age:</label>
    <input type="number" placeholder="Age"/><br><br>

    <label>search:</label>
    <input type="search" placeholder="search"/><br><br>
    
    <label>Date:</label>
    <input type="date"/><br><br>

    <label>Time:</label>
    <input type="time"/><br><br>

    <label>Date & Time:</label>
    <input type="datetime-local"/><br><br>

    <label>Month:</label>
    <input type="month"/><br><br>

    <label>Week:</label>
    <input type="week"/><br><br>

    <label>Favorite color:</label>
    <input type="color"/><br><br>   

    <label>Experience level:</label>
    <input type="range" min="0" max="10"/><br><br>

    <label>Gender:</label><br>
    <input type="radio" name="gender"/>Male
    <input type="radio" name="gender"/>Female<br><br>

    <label>Skill:</label><br>    
    <input type="checkbox"/>HTML 
    <input type="checkbox"/>CSS
    <input type="checkbox"/>JavaScript<br><br>

    <label>Upload Resume</label>
    <input type="file"/><br><br>

    <label>City:</label>
    <select>
        <option>Select City</option>
        <option>Mumbai</option>
        <option>Delhi</option>
        <option>Kolkata</option>
        <option>Chennai</option>
    </select><br><br>

    <label>Message:</label><br>
    <textarea rows="5" cols="30"></textarea><br><br>

    <button>Submit</button>

    </form>

</body>


</html>
