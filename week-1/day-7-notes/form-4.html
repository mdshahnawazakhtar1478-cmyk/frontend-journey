<!DOCTYPE html>
<html lang="eng">

<head>

    <link rel="stylesheet" href="style.css"/>

</head>

<body>

<form>

    <section>

            <h2>Html Form</h2>

        <div>
            <label for="fullName">Full Name:</label>
            <input type="text" placeholder="Full Name" id="fullName"/>
        </div>

        <div>
            <label for="password">Password:</label>
            <input type="password" placeholder="Password" id="password" minlength="8" maxlength="16"/>
        </div>

        <div>
            <label for="email">E-mail:</label>
            <input type="email" placeholder="E-mail" name="email" id="email" required/>
        </div>

        <div>
            <label for="phone">Phone:</label>
            <input type="tel" placeholder="Phone Number" id="phone" minlength="10" maxlength="10"/>
        </div>

         <div>    
            <label for="website">Website:</label>
            <input type="url" placeholder="website" id="website"/>
        </div>

        <div>
            <label for="age">Age:</label>
            <input type="number" placeholder="Age" id="age"/>
        </div>

        <fieldset>
            <legend>Skill:</legend>

            <div>
                <input type="checkbox" value="HTML" name="skills" id="html"/>
                <label for="html">HTML</label>
            </div> 
        
            <div>
                <input type="checkbox" value="CSS" name="skills" id="css"/>
                <label for="css">CSS</label>
            </div>

            <div>
                <input type="checkbox" value="JavaScript" name="skills" id="javascript"/>
                <label for="javascript">JavaScript</label>
            </div>

        </fieldset>

        <div>
            <label for="exprience">Exprience Level</label>
            
            <div>
                <select name="exprience" id="exprience">
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                </select>
            </div>
            
        </div>

        <div>
            <label for="uploadResume">Upload Resume</label>
            <input type="file" id="UploadResume"/>
        </div>

        <div>
            <label for="message">Message:</label><br>
            <textarea rows="5" cols="30" id="message"></textarea>
        </div>

        <button>Submit</button>

    </section>

</form>

</body>

</html>
