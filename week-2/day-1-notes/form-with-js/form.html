<!DOCTYPE html>
<html lang="eng">

<head>

    <title>Complete Html form</title>

    <link rel="stylesheet" href="form.css"/>
    <script src="form.js" defer></script>

</head>

<body>

    <form>

    <section>

        <h2>Complete Html form</h2>

        <div>
            <label>Full Name:</label>
            <input class="fullName" type="text" placeholder="Full Name" name="fullName"/>
        </div>

        <div>
            <label>E-mail:</label>
            <input class="email" type="email" placeholder="E-mail" name="email"/>
        </div>

        <div>

            <label>Phone:</label>
            <input class="phone" type="tel" placeholder="Phone Number" name="phone"/>

        </div>

        <div>    
            <label>GitHub:</label>
            <input class="github" type="url" placeholder="GitHub" name="github"/>
        </div>

        <div>
            <label>Message:</label><br>
            <textarea class="message" rows="5" cols="30" placeholder="Typing your message" name="message"></textarea>
        </div>

        <button type="submit" name="submit">Submit</button>

    </section>    

    </form>

</body>


</html>
